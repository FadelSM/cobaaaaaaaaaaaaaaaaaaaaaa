<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portofolio Prestasi Fadel</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2f5;
        margin: 0;
        padding: 10px;
        color: #333;
    }
    .container {
        max-width: 800px;
        margin: 10px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.6s ease-out;
    }
    .container.visible { opacity: 1; transform: translateY(0); }
    
    h1 { text-align: center; color: #4b0082; margin-bottom: 5px; font-size: 1.6rem; }
    h2 { color: #4b0082; border-left: 5px solid #4b0082; padding-left: 12px; margin-top: 25px; font-size: 1.3rem; }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 15px; 
        border: 2px solid #4b0082;
    }
    table th { 
        background-color: #4b0082; 
        color: white; 
        padding: 12px; 
        text-align: center; 
        border: 1px solid #ffffff;
    }
    table td { 
        border: 1px solid #ddd; 
        padding: 12px; 
        vertical-align: top; 
    }
    
    table tbody tr:nth-child(even) { background-color: #f9f6ff; }
    table tbody tr:hover { background-color: #f0eaff; }

    .link-aktif { font-weight: bold; color: #4b0082; text-decoration: underline; display: block; margin-bottom: 6px; }
    .tanpa-link { font-weight: bold; color: #777; display: block; margin-bottom: 6px; }

    .detail-text { font-size: 0.85rem; color: #555; line-height: 1.6; }
    .status-badge { 
        display: inline-block; 
        padding: 3px 10px; 
        border-radius: 4px; 
        font-weight: bold; 
        font-size: 0.8rem;
        background: #e6d9f5;
        color: #4b0082;
        border: 1px solid #d1bdf0;
    }
    .coming-soon { color: #888; font-style: italic; background: #eee; border: 1px solid #ddd; }

    .profil-list { list-style: none; padding: 0; }
    .profil-list li { margin-bottom: 8px; border-bottom: 1px dashed #ddd; padding-bottom: 4px; }
    .btn-ig { color: #fff; background: #4b0082; padding: 4px 12px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; }

    /* Gaya Copyright */
    footer {
        text-align: center;
        margin-top: 30px;
        padding-top: 15px;
        border-top: 1px solid #eee;
        font-size: 0.85rem;
        color: #666;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Portofolio Prestasi Siswa</h1>
    <p style="text-align:center; font-size: 0.85rem; color: #666;">Pembaruan: 30 Maret 2026</p>

    <h2>Profil Lengkap</h2>
    <ul class="profil-list">
        <li><strong>Nama:</strong> Fadel Shafwan Maliki</li>
        <li><strong>Sekolah:</strong> SMAS PGRI 3 Jakarta (Kelas X.4)</li>
        <li><strong>Instagram:</strong> <a href="https://www.instagram.com/fadelshafwanmaliki" target="_blank" class="btn-ig">Cek Profil</a></li>
    </ul>

    <h2>Daftar Kompetisi Nasional</h2>
    <table>
        <thead>
            <tr>
                <th style="width: 12%;">No</th>
                <th style="text-align: left;">Detail Kompetisi & Hasil</th>
            </tr>
        </thead>
        <tbody id="prestasi-body">
            </tbody>
    </table>

    <footer>
        Copyright &copy; 2026 FadelSM
    </footer>
</div>

<script>
    const dataPrestasi = [
        { nama: "Ramadhan Science Competition Indonesia (RSCI)", link: "https://app.puskanas.id/#piaghappyQ0JTNVFCKzNUVVJMVjhqeWQzazF5QT09", host: "Fosnas / Puskanas", bidang: "Informatika", hasil: "Medali Emas" },
        { nama: "Semarak Sains Nasional (SSN)", link: "https://app.puskanas.id/#piaghappyT2F4OHBGaW54UHhKNzYxY05aMG1HUT09", host: "Gemanesia / Puskanas", bidang: "Ekonomi", hasil: "Medali Emas" },
        { nama: "Semarak Sains Nasional (SSN)", link: "https://app.puskanas.id/#piaghappyMWplSVc3MXFyRUpPdm9LZGJ2NGlTUT09", host: "Gemanesia / Puskanas", bidang: "Ppkn", hasil: "Medali Emas" },
        { nama: "Semarak Sains Nasional (SSN)", link: "https://app.puskanas.id/#piaghappyU0MydjhYM2p3ZDhPM2N6eGpOUFp1QT09", host: "Gemanesia / Puskanas", bidang: "Informatika", hasil: "Medali Emas" },
        { nama: "National Science Competition (NSC)", link: "", host: "Puskanas", bidang: "Ppkn", hasil: "Medali Emas" },
        { nama: "National Science Competition (NSC)", link: "", host: "Puskanas", bidang: "Informatika", hasil: "Medali Emas" },
        { nama: "Olimpiade Sains Muda Indonesia (OSMI)", link: "", host: "Muda Sains Nasional", bidang: "Ekonomi", hasil: "Medali Perak" },
        { nama: "Olimpiade Sains Muda Indonesia (OSMI)", link: "", host: "Muda Sains Nasional", bidang: "Informatika", hasil: "Medali Emas" },
        { nama: "Future Science Competition (FSC)", link: "", host: "Yaspresnas", bidang: "Bahasa Indonesia", hasil: "Coming Soon" },
        { nama: "Future Science Competition (FSC)", link: "", host: "Yaspresnas", bidang: "Bahasa Inggris", hasil: "Coming Soon" },
        { nama: "Future Science Competition (FSC)", link: "", host: "Yaspresnas", bidang: "Matematika", hasil: "Coming Soon" },
        { nama: "Future Science Competition (FSC)", link: "", host: "Yaspresnas", bidang: "Kimia", hasil: "Coming Soon" },
        { nama: "Future Science Competition (FSC)", link: "", host: "Yaspresnas", bidang: "Informatika", hasil: "Coming Soon" },
        { nama: "Generasi Unggul Dalam Akademik (GARUDA)", link: "", host: "Lembaga Olimpiade Nasional", bidang: "Matematika", hasil: "Coming Soon" },
        { nama: "Generasi Unggul Dalam Akademik (GARUDA)", link: "", host: "Lembaga Olimpiade Nasional", bidang: "Akuntansi", hasil: "Coming Soon" },
        { nama: "Generasi Unggul Dalam Akademik (GARUDA)", link: "", host: "Lembaga Olimpiade Nasional", bidang: "Geografi", hasil: "Coming Soon" },
        { nama: "Generasi Unggul Dalam Akademik (GARUDA)", link: "", host: "Lembaga Olimpiade Nasional", bidang: "Informatika", hasil: "Coming Soon" },
        { nama: "Prestasi Tambahan Nasional", link: "", host: "Lembaga Terkait", bidang: "Umum", hasil: "Coming Soon" }
    ];

    const tbody = document.getElementById('prestasi-body');
    dataPrestasi.forEach((item, index) => {
        const isComing = item.hasil === "Coming Soon";
        const hasLink = item.link !== "";
        
        const titleHTML = hasLink 
            ? `<a href="${item.link}" target="_blank" class="link-aktif">${item.nama}</a>`
            : `<span class="tanpa-link">${item.nama}</span>`;

        const row = `
            <tr>
                <td style="text-align: center; font-weight: bold;">${index + 1}</td>
                <td>
                    ${titleHTML}
                    <div class="detail-text">
                        <b>Penyelenggara:</b> ${item.host}<br>
                        <b>Bidang:</b> ${item.bidang}<br>
                        <span class="status-badge ${isComing ? 'coming-soon' : ''}">${item.hasil}</span>
                    </div>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });

    window.addEventListener('load', () => {
        document.querySelector('.container').classList.add('visible');
    });
</script>

</body>
</html>
