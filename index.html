<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Sertifikat Fadel</title>
<style>
    :root {
        --primary-color: #4b0082;
        --secondary-color: #f4f0fa;
        --text-color: #333;
        --bg-color: #f0f2f5;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        padding: 10px;
    }

    .container {
        max-width: 850px;
        margin: 15px auto;
        padding: 25px;
        background-color: #fff;
        border-radius: 16px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.1);
    }
    
    .header-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .btn-print {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    /* Tabel Style */
    table { 
        width: 100%; 
        border-collapse: collapse;
        margin-top: 10px; 
        border: 2px solid var(--primary-color);
    }
    table th { 
        background-color: var(--primary-color); 
        color: white; 
        padding: 12px;
    }
    table td { 
        border: 1px solid #ddd; 
        padding: 12px;
        vertical-align: top;
    }

    .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        background: #e6d9f5;
        font-size: 0.8rem;
        font-weight: bold;
    }

    /* KOTAK RINGKASAN & PROFIL (Muncul di Web, Hilang saat Cetak) */
    .no-print-section { margin-bottom: 30px; }

    /* ==========================================
       PENGATURAN KHUSUS CETAK (PRINT)
       ========================================== */
    @media print {
        /* Sembunyikan semua kecuali tabel sertifikat */
        body { background: white; }
        .no-print-section, .btn-print, .search-group, .btn-ig { 
            display: none !important; 
        }
        
        .container { 
            box-shadow: none; 
            margin: 0; 
            padding: 0; 
            width: 100%;
        }

        /* Judul Khusus di Halaman Cetak */
        .print-only-header {
            display: block !important;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }

        table { border-color: black !important; }
        table th { background-color: #eee !important; color: black !important; border: 1px solid black; }
        table td { border-color: black !important; }
        
        .status-badge { border: 1px solid black !important; background: none !important; color: black !important; }
        
        footer { margin-top: 20px; border-top: 1px solid black !important; color: black !important; }
    }

    .print-only-header { display: none; } /* Sembunyikan di tampilan web biasa */
</style>
</head>
<body>

<div class="container">
    <div class="print-only-header">
        <h1 style="font-size: 20px; margin: 0;">DAFTAR SERTIFIKAT PRESTASI NASIONAL</h1>
        <p style="margin: 5px 0;">Nama: Fadel Shafwan Maliki | Sekolah: SMAS PGRI 3 Jakarta</p>
    </div>

    <div class="no-print-section">
        <div class="header-group">
            <h1 style="color:var(--primary-color)">Portofolio Prestasi</h1>
            <button onclick="window.print()" class="btn-print">Cetak Daftar Sertifikat</button>
        </div>
        
        <div style="background: var(--secondary-color); padding: 15px; border-radius: 10px;">
            <strong>Profil Singkat:</strong> Fadel Shafwan Maliki (Kelas X.4)
        </div>
    </div>

    <h2 style="font-size: 1.2rem; color: var(--primary-color);">Daftar Prestasi & Sertifikat</h2>
    
    <table>
        <thead>
            <tr>
                <th style="width: 50px;">No</th>
                <th style="text-align: left;">Nama Kompetisi & Bidang</th>
                <th style="width: 150px;">Hasil</th>
            </tr>
        </thead>
        <tbody id="prestasi-body">
            </tbody>
    </table>

    <footer>
        <p style="text-align: center; font-size: 12px; margin-top: 30px;">
            Dokumen disusun untuk keperluan akademik | Copyright &copy; 2026 FadelSM
        </p>
    </footer>
</div>

<script>
    const dataPrestasi = [
        { nama: "Ramadhan Science Competition Indonesia (RSCI)", bidang: "Informatika", hasil: "Medali Emas" },
        { nama: "Semarak Sains Nasional (SSN)", bidang: "Ekonomi", hasil: "Medali Emas" },
        { nama: "Semarak Sains Nasional (SSN)", bidang: "Ppkn", hasil: "Medali Emas" },
        { nama: "Semarak Sains Nasional (SSN)", bidang: "Informatika", hasil: "Medali Emas" },
        { nama: "National Science Competition (NSC)", bidang: "Ppkn", hasil: "Medali Emas" },
        { nama: "National Science Competition (NSC)", bidang: "Informatika", hasil: "Medali Emas" },
        { nama: "Olimpiade Sains Muda Indonesia (OSMI)", bidang: "Ekonomi", hasil: "Medali Perak" },
        { nama: "Olimpiade Sains Muda Indonesia (OSMI)", bidang: "Informatika", hasil: "Medali Emas" }
    ];

    const tbody = document.getElementById('prestasi-body');
    dataPrestasi.forEach((item, index) => {
        const row = `
            <tr>
                <td style="text-align: center;">${index + 1}</td>
                <td>
                    <strong>${item.nama}</strong><br>
                    <span style="font-size: 0.85rem; color: #666;">Bidang: ${item.bidang}</span>
                </td>
                <td style="text-align: center;">
                    <span class="status-badge">${item.hasil}</span>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
</script>

</body>
</html>
