<!DOCTYPE html>
<html lang="id">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KG8693GC');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Fadel Shafwan Maliki</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-900: #0f172a; --slate-800: #1e293b; --slate-700: #334155;
            --slate-400: #94a3b8; --indigo-500: #6366f1; --gold-color: #fbbf24;
            --silver-color: #cbd5e1; --coming-color: #f43f5e; --text-main: #f1f5f9;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        body {
            background-color: var(--slate-900);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        aside {
            width: 280px;
            background: linear-gradient(180deg, var(--slate-800) 0%, var(--slate-900) 100%);
            border-right: 1px solid var(--slate-700);
            padding: 40px 24px;
            display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh;
        }

        .dev-avatar { 
            width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 15px; overflow: hidden;
            border: 2px solid var(--indigo-500); padding: 3px;
        }
        .dev-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }

        .time-box {
            background: rgba(0,0,0,0.2); border: 1px solid var(--slate-700);
            border-radius: 12px; padding: 12px; margin-top: 20px;
        }
        .time-label { font-size: 0.6rem; color: var(--slate-400); text-transform: uppercase; letter-spacing: 1px; }
        .time-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--indigo-500); display: block; }

        main { flex: 1; padding: 40px 60px; overflow-y: auto; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--slate-800); padding: 20px; border-radius: 16px; border: 1px solid var(--slate-700); text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--indigo-500); }

        .table-container { background: var(--slate-800); border-radius: 16px; border: 1px solid var(--slate-700); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #1e293b; padding: 15px 20px; font-size: 0.7rem; color: var(--slate-400); text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--slate-700); font-size: 0.85rem; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; display: inline-block; }
        .badge-gold { background: rgba(251, 191, 36, 0.1); color: var(--gold-color); border: 1px solid var(--gold-color); }
        .badge-coming { background: rgba(244, 63, 94, 0.1); color: var(--coming-color); border: 1px solid var(--coming-color); }

        .countdown { 
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--coming-color); 
            display: block; margin-top: 5px; font-weight: 600;
        }

        .search-input {
            width: 100%; max-width: 400px; background: var(--slate-800); border: 1px solid var(--slate-700);
            padding: 10px 15px; border-radius: 10px; color: white; margin-bottom: 20px; outline: none;
        }

        @media (max-width: 768px) { body { flex-direction: column; } aside { width: 100%; height: auto; position: relative; } }
    </style>
</head>
<body>
    <aside>
        <div class="dev-avatar"><img src="https://files.catbox.moe/cwu6d7.png" alt="Fadel"></div>
        <h3 style="text-align:center; margin:0; font-size:1rem;">Fadel Shafwan Maliki</h3>
        <p style="text-align:center; color:var(--indigo-500); font-size:0.8rem; margin:5px 0 20px;">X.4 | SMA PGRI 3 Jakarta</p>
        
        <div class="time-box">
            <span class="time-label">Zona Waktu Anda</span>
            <span class="time-value" id="live-clock">00:00:00</span>
            <span style="font-size:0.6rem; color:var(--slate-400)" id="user-tz">Detecting...</span>
        </div>

        <div style="margin-top:auto;">
            <a href="https://instagram.com/fadelshafwanmaliki" style="display:block; background:var(--indigo-500); color:white; text-align:center; padding:10px; border-radius:10px; text-decoration:none; font-size:0.8rem; font-weight:700;">Instagram</a>
        </div>
    </aside>

    <main>
        <header style="margin-bottom:30px;">
            <h1 style="font-size:2rem; margin:0;">Achievement Repository</h1>
            <p style="color:var(--slate-400); margin:5px 0;">Database 20 kompetisi & prestasi tahun akademik 2026.</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="count-gold">0</div><div style="font-size:0.7rem; color:var(--slate-400)">MEDALI EMAS</div></div>
            <div class="stat-card"><div class="stat-value" id="count-total">20</div><div style="font-size:0.7rem; color:var(--slate-400)">TOTAL LOMBA</div></div>
            <div class="stat-card"><div class="stat-value">2026</div><div style="font-size:0.7rem; color:var(--slate-400)">TAHUN AKTIF</div></div>
        </div>

        <input type="text" id="search-bar" class="search-input" placeholder="Cari nama lomba...">

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Jadwal / Countdown</th>
                        <th>Kompetisi</th>
                        <th>Bidang</th>
                        <th>Status / Hasil</th>
                    </tr>
                </thead>
                <tbody id="render-target"></tbody>
            </table>
        </div>
    </main>

    <script>
        // Database 20 Lomba (ISO Format untuk akurasi timezone)
        const repository = [
            { date: "2026-03-01T08:00:00", name: "RSCI 2026", host: "Fosnas", field: "Informatika", result: "Medali Emas" },
            { date: "2026-03-15T08:00:00", name: "SSN Ekonomi", host: "Gemanesia", field: "Ekonomi", result: "Medali Emas" },
            { date: "2026-03-15T08:00:00", name: "SSN PPKN", host: "Gemanesia", field: "PPKN", result: "Medali Emas" },
            { date: "2026-03-15T08:00:00", name: "SSN Informatika", host: "Gemanesia", field: "Informatika", result: "Medali Emas" },
            { date: "2026-03-29T08:00:00", name: "NSC PPKN", host: "Puskanas", field: "PPKN", result: "Medali Emas" },
            { date: "2026-03-29T08:00:00", name: "NSC Informatika", host: "Puskanas", field: "Informatika", result: "Medali Emas" },
            { date: "2026-03-29T08:00:00", name: "OSMI Ekonomi", host: "Muda Sains", field: "Ekonomi", result: "Medali Perak" },
            { date: "2026-03-29T08:00:00", name: "OSMI Informatika", host: "Muda Sains", field: "Informatika", result: "Medali Emas" },
            { date: "2026-04-05T08:00:00", name: "FSC B. Indonesia", host: "Yaspresnas", field: "Bahasa", result: "Medali Perak" },
            { date: "2026-04-05T08:00:00", name: "FSC B. Inggris", host: "Yaspresnas", field: "Bahasa", result: "Medali Emas" },
            { date: "2026-04-05T08:00:00", name: "FSC Matematika", host: "Yaspresnas", field: "Matematika", result: "Medali Perak" },
            { date: "2026-04-05T08:00:00", name: "FSC Kimia", host: "Yaspresnas", field: "Kimia", result: "Medali Perak" },
            { date: "2026-04-05T08:00:00", name: "FSC Informatika", host: "Yaspresnas", field: "Informatika", result: "Medali Perak" },
            // MENDATANG (Countdown Aktif)
            { date: "2026-04-19T14:00:00", name: "PSPI Informatika", host: "Gemanesia", field: "Informatika", result: "Coming Soon" },
            { date: "2026-04-19T11:00:00", name: "OSTN Biologi", host: "Sentral Olimpiade", field: "Biologi", result: "Coming Soon" },
            { date: "2026-04-19T16:00:00", name: "OSTN PPKN", host: "Sentral Olimpiade", field: "PPKN", result: "Coming Soon" },
            { date: "2026-04-26T09:00:00", name: "KSN Ekonomi", host: "Puskanas", field: "Ekonomi", result: "Coming Soon" },
            { date: "2026-04-26T14:00:00", name: "KSN Informatika", host: "Puskanas", field: "Informatika", result: "Coming Soon" },
            { date: "2026-05-24T14:00:00", name: "SEON Geografi", host: "Sentral Olimpiade", field: "Geografi", result: "Coming Soon" },
            { date: "2026-05-24T15:00:00", name: "SEON Informatika", host: "Sentral Olimpiade", field: "Informatika", result: "Coming Soon" }
        ];

        function updateTimers() {
            const now = new Date().getTime();
            const rows = document.querySelectorAll('.timer-cell');
            
            rows.forEach(cell => {
                const target = new Date(cell.dataset.time).getTime();
                const distance = target - now;
                const display = cell.querySelector('.countdown');

                if (distance < 0) {
                    if (display) display.innerText = "Selesai / Berlangsung";
                } else {
                    const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((distance % (1000 * 60)) / 1000);
                    if (display) display.innerText = `${d} Hari ${h}:${m}:${s}`;
                }
            });

            // Update Jam Sidebar
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB');
        }

        function render(data) {
            const target = document.getElementById('render-target');
            target.innerHTML = "";
            data.forEach(item => {
                const isComing = item.result === "Coming Soon";
                const dateObj = new Date(item.date);
                const dateStr = dateObj.toLocaleDateString('id-ID', { day:'numeric', month:'short' });
                
                target.innerHTML += `
                    <tr>
                        <td class="timer-cell" data-time="${item.date}">
                            <span style="font-weight:700">${dateStr}</span>
                            ${isComing ? `<span class="countdown">Loading...</span>` : `<span style="display:block; font-size:0.6rem; color:var(--slate-400)">Tuntas</span>`}
                        </td>
                        <td><div style="font-weight:600">${item.name}</div><div style="font-size:0.7rem; color:var(--slate-400)">${item.host}</div></td>
                        <td>${item.field}</td>
                        <td><span class="badge ${isComing ? 'badge-coming' : 'badge-gold'}">${item.result}</span></td>
                    </tr>`;
            });
        }

        // Init
        document.getElementById('user-tz').innerText = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById('count-gold').innerText = repository.filter(i => i.result.includes("Emas")).length;
        render(repository);
        setInterval(updateTimers, 1000);
        updateTimers();

        document.getElementById('search-bar').addEventListener('input', (e) => {
            const filtered = repository.filter(i => i.name.toLowerCase().includes(e.target.value.toLowerCase()));
            render(filtered);
        });
    </script>
</body>
</html>
