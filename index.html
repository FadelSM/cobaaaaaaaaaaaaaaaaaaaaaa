<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestasi Fadel Shafwan Maliki</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #818cf8;
            --accent: #c084fc;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-item span {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .info-item p {
            margin: 0;
            font-weight: 600;
        }

        .grid-prestasi {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            background: var(--primary);
            color: #fff;
            margin-bottom: 10px;
            display: inline-block;
        }

        .medal-gold { background: linear-gradient(45deg, #fbbf24, #d97706); }
        .medal-silver { background: linear-gradient(45deg, #94a3b8, #475569); }
        .coming { background: #334155; }

        .card h3 {
            margin: 10px 0;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .card p {
            font-size: 0.85rem;
            margin: 5px 0;
            color: #cbd5e1;
        }

        .link-btn {
            display: inline-block;
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 5px 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .link-btn:hover {
            background: var(--accent);
            color: white;
        }

        .stats {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Academic Portfolio</h1>
        <p>Fadel Shafwan Maliki • Kelas X.4</p>
    </header>

    <div class="profile-card">
        <div class="info-item">
            <span>Asal Sekolah</span>
            <p>SMAS PGRI 3 Jakarta</p>
        </div>
        <div class="info-item">
            <span>Ekskul</span>
            <p>Bulu Tangkis (A-14)</p>
        </div>
        <div class="info-item">
            <span>Instagram</span>
            <p><a href="https://instagram.com/fadelshafwanmaliki" target="_blank" style="color: var(--accent); text-decoration: none;">@fadelshafwanmaliki</a></p>
        </div>
    </div>

    <div class="grid-prestasi" id="prestasi-container">
        </div>

    <div class="stats">
        <p>Terakhir diperbarui: 1 April 2026 | Dokumen Akademik Terverifikasi</p>
    </div>
</div>

<script>
    const data = [
        { nama: "RSCI 2026", host: "Fosnas", bidang: "Informatika", hasil: "Medali Emas (A+)", link: "https://app.puskanas.id/#piaghappyQ0JTNVFCKzNUVVJMVjhqeWQzazF5QT09" },
        { nama: "SSN Ekonomi", host: "Gemanesia", bidang: "Ekonomi", hasil: "Medali Emas", link: "https://app.puskanas.id/#piaghappyT2F4OHBGaW54UHhKNzYxY05aMG1HUT09" },
        { nama: "SSN PPKN", host: "Gemanesia", bidang: "PPKN", hasil: "Medali Emas", link: "https://app.puskanas.id/#piaghappyMWplSVc3MXFyRUpPdm9LZGJ2NGlTUT09" },
        { nama: "SSN Informatika", host: "Gemanesia", bidang: "Informatika", hasil: "Medali Emas", link: "https://app.puskanas.id/#piaghappyU0MydjhYM2p3ZDhPM2N6eGpOUFp1QT09" },
        { nama: "NSC PPKN", host: "Puskanas", bidang: "PPKN", hasil: "Medali Emas", link: "https://app.puskanas.id" },
        { nama: "NSC Informatika", host: "Puskanas", bidang: "Informatika", hasil: "Medali Emas", link: "https://app.puskanas.id" },
        { nama: "OSMI Ekonomi", host: "Muda Sains Nasional", bidang: "Ekonomi", hasil: "Medali Perak", link: "#" },
        { nama: "OSMI Informatika", host: "Muda Sains Nasional", bidang: "Informatika", hasil: "Medali Emas", link: "#" },
        { nama: "FSC Bahasa Indonesia", host: "Yaspresnas", bidang: "B. Indonesia", hasil: "Coming Soon", link: "" },
        { nama: "FSC Bahasa Inggris", host: "Yaspresnas", bidang: "B. Inggris", hasil: "Coming Soon", link: "" },
        { nama: "FSC Matematika", host: "Yaspresnas", bidang: "Matematika", hasil: "Coming Soon", link: "" },
        { nama: "FSC Kimia", host: "Yaspresnas", bidang: "Kimia", hasil: "Coming Soon", link: "" },
        { nama: "FSC Informatika", host: "Yaspresnas", bidang: "Informatika", hasil: "Coming Soon", link: "" },
        { nama: "GARUDA Matematika", host: "Lembaga Olimpiade", bidang: "Matematika", hasil: "Coming Soon", link: "" },
        { nama: "GARUDA Akuntansi", host: "Lembaga Olimpiade", bidang: "Akuntansi", hasil: "Coming Soon", link: "" },
        { nama: "GARUDA Geografi", host: "Lembaga Olimpiade", bidang: "Geografi", hasil: "Coming Soon", link: "" },
        { nama: "GARUDA Informatika", host: "Lembaga Olimpiade", bidang: "Informatika", hasil: "Coming Soon", link: "" },
        { nama: "Tambahan Nasional", host: "Lembaga Terkait", bidang: "Umum", hasil: "Coming Soon", link: "" }
    ];

    const container = document.getElementById('prestasi-container');

    data.forEach(item => {
        let medalClass = 'coming';
        if(item.hasil.includes('Emas')) medalClass = 'medal-gold';
        if(item.hasil.includes('Perak')) medalClass = 'medal-silver';

        container.innerHTML += `
            <div class="card">
                <span class="badge ${medalClass}">${item.hasil}</span>
                <h3>${item.nama}</h3>
                <p><strong>Penyelenggara:</strong> ${item.host}</p>
                <p><strong>Bidang:</strong> ${item.bidang}</p>
                ${item.link ? `<a href="${item.link}" target="_blank" class="link-btn">Lihat Sertifikat</a>` : ''}
            </div>
        `;
    });
</script>

</body>
</html>
