<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStack Portfolio | Fadel Shafwan Maliki</title>
    <style>
        :root {
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --indigo-500: #6366f1;
            --emerald-500: #10b981;
            --text-main: #f1f5f9;
        }

        body {
            background-color: var(--slate-900);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - Ciri khas Full Stack App */
        aside {
            width: 260px;
            background: var(--slate-800);
            border-right: 1px solid #334155;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .dev-profile { text-align: center; margin-bottom: 40px; }
        .dev-avatar { 
            width: 80px; height: 80px; background: var(--indigo-500); 
            border-radius: 20%; margin: 0 auto 15px; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 2rem;
        }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--slate-800);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--indigo-500); }

        /* Project Table - Logic Driven */
        .table-container {
            background: var(--slate-800);
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #2d3748; padding: 15px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
        td { padding: 15px; border-bottom: 1px solid #334155; font-size: 0.9rem; }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-gold { background: rgba(16, 185, 129, 0.2); color: var(--emerald-500); }
        .badge-pending { background: rgba(148, 163, 184, 0.1); color: #94a3b8; }

        .action-link {
            color: var(--indigo-500);
            text-decoration: none;
            font-weight: 600;
        }

        .action-link:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { width: 100%; box-sizing: border-box; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="dev-profile">
            <div class="dev-avatar">FS</div>
            <h3 style="margin: 0;">Fadel Shafwan M.</h3>
            <p style="color: #94a3b8; font-size: 0.8rem;">Full-Stack Developer</p>
        </div>
        <nav style="font-size: 0.9rem; color: #94a3b8;">
            <p>INSTITUTION: <b>SMAS PGRI 3 Jakarta</b></p>
            <p>CLASS: <b>X.4</b></p>
            <p>TECH: <b>JS / Node.js / Security</b></p>
        </nav>
    </aside>

    <main>
        <header style="margin-bottom: 30px;">
            <h1 style="margin: 0;">Achievement Repository</h1>
            <p style="color: #94a3b8;">Production-ready database of national competitions.</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="count-gold">0</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Gold Medals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="count-total">0</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Total Entries</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">2026</div>
                <div style="font-size: 0.8rem; color: #94a3b8;">Current Session</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Competition Name</th>
                        <th>Host</th>
                        <th>Subject</th>
                        <th>Status</th>
                        <th>Files</th>
                    </tr>
                </thead>
                <tbody id="render-target">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // Data Structure - Tunjukkan ke guru kalau kamu paham Object-Oriented style
        const repository = [
            { id: 1, name: "RSCI 2026", host: "Fosnas", field: "Informatika", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/1eztmI8LVAH0UOV_WnVB1RjkLmjBTwiT1/view?usp=drive_link" },
            { id: 2, name: "SSN Ekonomi", host: "Gemanesia", field: "Ekonomi", result: "Medali Emas", link: "https://drive.google.com/file/d/1LMRLct-DOdGwMh6F1bHQMS-1yfU02pQr/view?usp=drive_link" },
            { id: 3, name: "SSN PPKN", host: "Gemanesia", field: "PPKN", result: "Medali Emas", link: "https://drive.google.com/file/d/1IoBjF9ho5bU-zgQRFivI_5ZNVGPF6R6I/view?usp=drive_link" },
            { id: 4, name: "SSN Informatika", host: "Gemanesia", field: "Informatika", result: "Medali Emas", link: "https://drive.google.com/file/d/1Hd72RWn1hA8_EhKtoeVd5B4YK8XIt4w2/view?usp=drive_link" },
            { id: 5, name: "NSC PPKN", host: "Puskanas", field: "PPKN", result: "Medali Emas", link: "https://app.puskanas.id" },
            { id: 6, name: "NSC Informatika", host: "Puskanas", field: "Informatika", result: "Medali Emas", link: "https://app.puskanas.id" },
            { id: 7, name: "OSMI Ekonomi", host: "Muda Sains", field: "Ekonomi", result: "Medali Perak", link: "#" },
            { id: 8, name: "OSMI Informatika", host: "Muda Sains", field: "Informatika", result: "Medali Emas", link: "#" },
            // Batch process untuk Coming Soon data
            ...Array.from({length: 10}, (_, i) => ({
                id: 9 + i, name: i < 5 ? "Future Science Comp (FSC)" : "Garuda National", 
                host: "Penyelenggara Nasional", field: "Multiple Subjects", result: "In Queue", link: ""
            }))
        ];

        const renderTarget = document.getElementById('render-target');
        
        // Logic: Membangun baris tabel secara programmatik
        function initDashboard() {
            repository.forEach(item => {
                const isGold = item.result.includes("Emas");
                const row = `
                    <tr>
                        <td style="font-weight: 600;">${item.name}</td>
                        <td style="color: #94a3b8;">${item.host}</td>
                        <td>${item.field}</td>
                        <td>
                            <span class="badge ${isGold ? 'badge-gold' : 'badge-pending'}">
                                ${item.result.toUpperCase()}
                            </span>
                        </td>
                        <td>
                            ${item.link ? `<a href="${item.link}" target="_blank" class="action-link">Open_Link</a>` : '--'}
                        </td>
                    </tr>
                `;
                renderTarget.innerHTML += row;
            });

            // Update Statistics
            document.getElementById('count-gold').innerText = repository.filter(i => i.result.includes("Emas")).length;
            document.getElementById('count-total').innerText = repository.length;
        }

        // Execute
        initDashboard();
    </script>
</body>
</html>
