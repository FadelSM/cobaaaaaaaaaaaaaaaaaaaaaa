<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FadelSM | Pro Repository</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --indigo-500: #6366f1;
            --emerald-500: #10b981;
            --amber-500: #f59e0b;
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background-color: var(--slate-950); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* Sidebar Style */
        aside { width: 280px; background: var(--slate-900); border-right: 1px solid var(--slate-800); padding: 40px 24px; flex-shrink: 0; }
        .avatar { width: 60px; height: 60px; background: var(--indigo-500); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.5rem; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .sidebar-info { margin-top: 25px; border-top: 1px solid var(--slate-800); padding-top: 20px; }
        .label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; font-weight: 800; display: block; margin-top: 12px; }
        .val { font-size: 0.85rem; color: #cbd5e1; font-weight: 600; }

        /* Main Content Style */
        main { flex: 1; padding: 40px 60px; max-width: 1200px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2.2rem; margin: 0 0 30px 0; font-weight: 800; letter-spacing: -1px; }

        #searchInput { width: 100%; padding: 16px 20px; background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 12px; color: #fff; font-family: inherit; margin-bottom: 30px; }
        #searchInput:focus { outline: none; border-color: var(--indigo-500); }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: var(--slate-900); padding: 20px; border-radius: 16px; border: 1px solid var(--slate-800); }
        .card-num { font-size: 2.5rem; font-weight: 800; }
        .bar-bg { width: 100%; background: var(--slate-800); height: 6px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--indigo-500); width: 0%; transition: width 1s ease; }

        /* Table Style */
        .table-wrap { background: var(--slate-900); border-radius: 16px; border: 1px solid var(--slate-800); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px 20px; font-size: 0.7rem; color: #475569; text-transform: uppercase; border-bottom: 1px solid var(--slate-800); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--slate-800); font-size: 0.85rem; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .emas { background: rgba(16, 185, 129, 0.1); color: var(--emerald-500); }
        .final { background: rgba(245, 158, 11, 0.1); color: var(--amber-500); }

        @media (max-width: 768px) { body { flex-direction: column; } aside { width: 100%; } main { padding: 20px; } }
    </style>
</head>
<body>

    <aside>
        <div class="avatar">FS</div>
        <h2 style="font-size: 1.1rem; margin: 0;">Fadel Shafwan M.</h2>
        <div class="sidebar-info">
            <span class="label">Institution</span>
            <span class="val">SMAS PGRI 3 Jakarta</span>
            <span class="label">Class</span>
            <span class="val">X.4 (2026)</span>
            <span class="label">Specialist</span>
            <span class="val">Security Researcher</span>
        </div>
    </aside>

    <main>
        <h1>Achievement DB</h1>

        <input type="text" id="searchInput" placeholder="Search subject or competition...">

        <div class="stats">
            <div class="card">
                <span class="label" style="margin:0">Gold Medals</span>
                <div class="card-num" id="gold-count">0</div>
                <div class="bar-bg"><div id="bar-fill" class="bar-fill"></div></div>
            </div>
            <div class="card">
                <span class="label" style="margin:0">Total Records</span>
                <div class="card-num" id="total-count">0</div>
                <div style="font-size: 0.7rem; color: var(--emerald-500); margin-top: 10px; font-weight: 700;">● SYSTEM VERIFIED</div>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Competition</th>
                        <th>Organizer</th>
                        <th>Subject</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        // DATABASE LENGKAP (Struktur bersih seperti awal)
        const db = [
            { name: "Ramadhan Science Competition (RSCI)", host: "Fosnas", sub: "Informatika", res: "Medali Emas" },
            { name: "Semarak Sains Nasional (SSN)", host: "Gemanesia", sub: "Informatika", res: "Medali Emas" },
            { name: "Semarak Sains Nasional (SSN)", host: "Gemanesia", sub: "Ekonomi", res: "Medali Emas" },
            { name: "Semarak Sains Nasional (SSN)", host: "Gemanesia", sub: "PPKN", res: "Medali Emas" },
            { name: "National Science Competition (NSC)", host: "Puskanas", sub: "Informatika", res: "Medali Emas" },
            { name: "National Science Competition (NSC)", host: "Puskanas", sub: "PPKN", res: "Medali Emas" },
            { name: "Olimpiade Sains Muda (OSMI)", host: "Muda Sains", sub: "Informatika", res: "Medali Emas" },
            { name: "Kompetisi Juara Indonesia (KJI)", host: "KJI", sub: "Biologi", res: "Medali Emas" },
            { name: "Edu Expo Indonesia", host: "Edu Expo", sub: "Kimia", res: "Grand Finalist" }
        ];

        function render(data) {
            const table = document.getElementById('table-body');
            table.innerHTML = '';
            
            data.forEach(item => {
                const isGold = item.res.includes("Emas");
                const row = `<tr>
                    <td style="font-weight: 700;">${item.name}</td>
                    <td style="color: #64748b;">${item.host}</td>
                    <td>${item.sub}</td>
                    <td><span class="badge ${isGold ? 'emas' : 'final'}">${item.res}</span></td>
                </tr>`;
                table.insertAdjacentHTML('beforeend', row);
            });

            // Update Stats
            const goldCount = db.filter(x => x.res.includes("Emas")).length;
            document.getElementById('gold-count').innerText = goldCount;
            document.getElementById('total-count').innerText = db.length;
            document.getElementById('bar-fill').style.width = "100%";
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = db.filter(x => x.name.toLowerCase().includes(val) || x.sub.toLowerCase().includes(val));
            render(filtered);
        });

        // Run
        render(db);
        console.log("FadelSM Repository: All systems nominal.");
    </script>
</body>
</html>
